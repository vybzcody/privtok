<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FF0000" />
    <meta name="description" content="PrivTok - Privacy-first creator platform on Aleo. Monetize content with zero-knowledge privacy." />
    <meta name="keywords" content="PrivTok, Aleo, Privacy, Creator Economy, Zero-Knowledge, ZK, Content Monetization" />
    <meta name="author" content="PrivTok" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PrivTok - Privacy-First Creator Platform" />
    <meta property="og:description" content="Monetize your content privately on Aleo. Set your own prices and get paid directly by your fans." />
    <meta property="og:image" content="/logo512.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrivTok - Privacy-First Creator Platform" />
    <meta name="twitter:description" content="Monetize your content privately on Aleo." />
    
    <link rel="apple-touch-icon" href="/logo129.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <title>PrivTok - Privacy-First Creator Platform on Aleo</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        /* Loading Animation */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .logo-animation {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
            animation: pulse 2s ease-in-out infinite;
        }

        .logo-animation img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.5));
        }

        .loading-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #FF0000 0%, #ff4d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 1s ease-in-out;
        }

        .loading-subtext {
            font-size: 14px;
            color: #666;
            animation: fadeIn 1.5s ease-in-out;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            margin-top: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF0000;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Gradient Text Utility */
        .gradient-text {
            background: linear-gradient(135deg, #FF0000 0%, #ff4d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
        <div class="loading-container">
            <div class="logo-animation">
                <img src="/logo512.png" alt="PrivTok Logo" onerror="this.style.display='none'">
            </div>
            <div class="loading-text">PrivTok</div>
            <div class="loading-subtext">Loading privacy-first creator platform...</div>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/index.jsx"></script>
</body>

</html>
